{% extends "base.html" %}
{% block title %}Post Project – DUT Hub{% endblock %}
{% block sidebar %}
<a href="{{ url_for('faculty.dashboard') }}"><i class="fa fa-home"></i> Dashboard</a>
<a href="{{ url_for('faculty.post_project') }}" class="active"><i class="fa fa-plus-circle"></i> Post Project</a>
<a href="{{ url_for('faculty.my_projects') }}"><i class="fa fa-folder"></i> My Projects</a>
<a href="{{ url_for('faculty.applications') }}"><i class="fa fa-inbox"></i> Applications</a>
{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1><i class="fa fa-plus-circle" style="color:var(--gold)"></i> Post New Project</h1>
    <p>Fill in the details below to publish a project</p>
  </div>
</div>
<div class="card" style="max-width:700px;">
  <form method="POST">
    <div class="form-group">
      <label>Project Title</label>
      <input type="text" name="title" placeholder="e.g. AI-Assisted Crop Disease Detection" required/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" rows="4" placeholder="Describe the project goals, methods, and expected outcomes..." required></textarea>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label>Department</label>
        <input type="text" name="department" placeholder="e.g. Computer Science" required/>
      </div>
      <div class="form-group">
        <label>Available Slots</label>
        <input type="number" name="slots" value="4" min="1" required/>
      </div>
      <div class="form-group">
        <label>Application Deadline</label>
        <input type="date" name="deadline" required/>
      </div>
      <div class="form-group">
        <label>Project End Date</label>
        <input type="date" name="end_date" required/>
      </div>
    </div>
    <div class="form-group">
      <label>Requirements / Skills</label>
      <input type="text" name="requirements" placeholder="e.g. Python, Machine Learning, OpenCV"/>
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:0.875rem; font-weight:600; color:var(--gray-800); display:block; margin-bottom:8px;">Milestones</label>
      <div id="milestones">
        <div style="display:grid; grid-template-columns:1fr auto; gap:8px; margin-bottom:8px;">
          <input type="text" name="milestone_title[]" placeholder="Milestone title"/>
          <input type="date" name="milestone_date[]" style="width:150px;"/>
        </div>
      </div>
      <button type="button" onclick="addMilestone()" class="btn btn-outline btn-sm"><i class="fa fa-plus"></i> Add Milestone</button>
    </div>

    <button type="submit" class="btn btn-primary"><i class="fa fa-paper-plane"></i> Publish Project</button>
  </form>
</div>
<script>
function addMilestone() {
  const div = document.createElement('div');
  div.style = 'display:grid; grid-template-columns:1fr auto; gap:8px; margin-bottom:8px;';
  div.innerHTML = '<input type="text" name="milestone_title[]" placeholder="Milestone title"/><input type="date" name="milestone_date[]" style="width:150px;"/>';
  document.getElementById('milestones').appendChild(div);
}
</script>
{% endblock %}
